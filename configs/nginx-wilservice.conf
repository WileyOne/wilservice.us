# Nginx config for wilservice.us (static site)
# Copy to /etc/nginx/sites-available/wilservice.us, then:
#   sudo ln -s /etc/nginx/sites-available/wilservice.us /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name wilservice.us www.wilservice.us;
    root /var/www/wilservice.us;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(css|js|ico|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Optional: HTTPS with Certbot
    # After copying this file, run: sudo certbot --nginx -d wilservice.us -d www.wilservice.us
    # Then uncomment the block below and reload nginx.
    # listen 443 ssl;
    # listen [::]:443 ssl;
    # ssl_certificate /etc/letsencrypt/live/wilservice.us/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/wilservice.us/privkey.pem;
}
